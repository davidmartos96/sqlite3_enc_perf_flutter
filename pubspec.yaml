name: sqlite3_perf_flutter
description: "A new Flutter project."
publish_to: none

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqlite3: ^3.3.1
  uuid: ^4.5.3
  path_provider: ^2.1.5
  path: ^1.9.1
  sqlcipher:
    path: sqlcipher

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

hooks:
  user_defines:
    # SQLite3MultipleCiphers
    # sqlite3:
    #  source: sqlite3mc

    # SQLCipher on Android (links with the .so from the binaries distributed by SQLCipher)
    sqlite3:
      source: system
      name: sqlcipher

    # SQLCipher on iOS/macOS (links statically with the binaries distributed by SQLCipher)
    # sqlite3:
    #   source: process

    